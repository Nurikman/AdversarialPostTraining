<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Correct Rate by Condition</title>
<style>
body { font-family: Arial, sans-serif; background: #fffaf0; color: #111827; }
.wrap { max-width: 1120px; margin: 24px auto; }
h1 { margin-bottom: 6px; font-size: 28px; }
p { margin-top: 0; color: #4b5563; }
svg text { font-family: Arial, sans-serif; }
</style>
</head>
<body>
<div class="wrap">
<h1>Correct Rate by Training Condition</h1>
<p>Blue = base model. Orange = mean correct_rate of the fine-tuned runs for that condition.</p>
<svg width="1100" height="560" viewBox="0 0 1100 560">
<rect x="0" y="0" width="1100" height="560" fill="#fffaf0" />
<line x1="80" y1="440.0" x2="1070" y2="440.0" stroke="#d1d5db" />
<text x="70" y="444.0" text-anchor="end" font-size="12" fill="#374151">0%</text>
<line x1="80" y1="366.0" x2="1070" y2="366.0" stroke="#d1d5db" />
<text x="70" y="370.0" text-anchor="end" font-size="12" fill="#374151">20%</text>
<line x1="80" y1="292.0" x2="1070" y2="292.0" stroke="#d1d5db" />
<text x="70" y="296.0" text-anchor="end" font-size="12" fill="#374151">40%</text>
<line x1="80" y1="218.0" x2="1070" y2="218.0" stroke="#d1d5db" />
<text x="70" y="222.0" text-anchor="end" font-size="12" fill="#374151">60%</text>
<line x1="80" y1="144.0" x2="1070" y2="144.0" stroke="#d1d5db" />
<text x="70" y="148.0" text-anchor="end" font-size="12" fill="#374151">80%</text>
<line x1="80" y1="70.0" x2="1070" y2="70.0" stroke="#d1d5db" />
<text x="70" y="74.0" text-anchor="end" font-size="12" fill="#374151">100%</text>
<line x1="80" y1="70" x2="80" y2="440" stroke="#374151" />
<line x1="80" y1="440" x2="1070" y2="440" stroke="#374151" />
<rect x="263.5" y="103.3" width="58.0" height="336.7" fill="#457b9d" rx="4" />
<text x="292.5" y="95.3" text-anchor="middle" font-size="12" fill="#111827">91.0%</text>
<rect x="333.5" y="188.4" width="58.0" height="251.6" fill="#e76f51" rx="4" />
<text x="362.5" y="180.4" text-anchor="middle" font-size="12" fill="#111827">68.0%</text>
<text x="327.5" y="470.0" text-anchor="middle" font-size="12" fill="#111827">overwrite</text>
<rect x="758.5" y="110.7" width="58.0" height="329.3" fill="#457b9d" rx="4" />
<text x="787.5" y="102.7" text-anchor="middle" font-size="12" fill="#111827">89.0%</text>
<rect x="828.5" y="145.5" width="58.0" height="294.5" fill="#e76f51" rx="4" />
<text x="857.5" y="137.5" text-anchor="middle" font-size="12" fill="#111827">79.6%</text>
<text x="822.5" y="470.0" text-anchor="middle" font-size="12" fill="#111827">underwrite_010</text>
<rect x="840" y="26" width="14" height="14" fill="#457b9d" rx="2" />
<text x="860" y="38" font-size="12" fill="#111827">Base model</text>
<rect x="960" y="26" width="14" height="14" fill="#e76f51" rx="2" />
<text x="980" y="38" font-size="12" fill="#111827">Fine-tuned mean</text>
</svg>
</div>
</body>
</html>
